# Promptomatik - Cloudflare Pages Configuration
name = "promptomatik"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = "./"

# D1 Database binding
[[d1_databases]]
binding = "DB" # This will be available as env.DB in your Workers
database_name = "promptomatik-db"
database_id = "9eee3504-b04a-41a6-b819-aa47bc8587a8"

# KV Namespace for rate limiting and session management
[[kv_namespaces]]
binding = "RATE_LIMITER"  # Match the actual namespace title from dashboard
id = "0a86dc1ccbb34ec2a505bfc0eb5e5401"

# Environment variables (set these via wrangler secret put)
[vars]
ENVIRONMENT = "development" # Change to "development" for local testing
ALLOWED_ORIGINS = "http://localhost:3000,http://127.0.0.1:3000,http://localhost:8788,http://127.0.0.1:8788" # Update with your actual domains

# Secrets (set via wrangler secret put)
# Run these commands to set your secrets:
# wrangler secret put JWT_SECRET
# wrangler secret put OPENROUTER_API_KEY
# wrangler secret put RESEND_API_KEY

# Development database (optional - for local development)
# Uncomment and configure for local testing
# [[d1_databases]]
# binding = "DB"
# database_name = "teachinspire-prompt-builder-dev"
# database_id = ""
# preview_database_id = ""